<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>PDCAコギ</title>
<meta name="theme-color" content="#E07A2C" />
<link rel="manifest" href="./manifest.json" />
<link rel="apple-touch-icon" href="./icon-192.png" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="PDCAコギ" />
<style>
  html, body, #root { margin:0; padding:0; height:100%; }
  * { -webkit-tap-highlight-color: transparent; }
  body { overscroll-behavior-y: none; }
</style>
<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body>
<div id="root"></div>
<script type="text/babel" data-presets="react">
const { useState, useEffect, useRef } = React;

const STAGES = [
  { key: "plan", label: "Plan", ja: "けいかく", color: "#3B8F6E", bg: "#EAF6EF", emoji: "🐾",
    desc: "なにを試す?", hint: "コギまろ「まずは小さなゴールを決めよう!」",
    chips: ["今週やってみたいこと", "目標の数字を決める", "なぜやるか書く"] },
  { key: "do", label: "Do", ja: "じっこう", color: "#E07A2C", bg: "#FDF1E6", emoji: "🏃",
    desc: "やってみた記録", hint: "コギまろ「やったことをそのまま書けばOK!」",
    chips: ["実際にやったこと", "かかった時間", "気づいたこと"] },
  { key: "check", label: "Check", ja: "ふりかえり", color: "#3B6E9C", bg: "#EAF1FA", emoji: "🔍",
    desc: "どうだった?", hint: "コギまろ「うまくいった所・いかなかった所を見てみよう」",
    chips: ["うまくいった点", "イマイチだった点", "数字で見た結果"] },
  { key: "act", label: "Act", ja: "かいぜん", color: "#B0508C", bg: "#FBEDF4", emoji: "✨",
    desc: "次はどうする?", hint: "コギまろ「次のPlanにつながるヒントを書こう!」",
    chips: ["次に変えること", "続けたいこと", "次のサイクルへ"] },
];

function uid() {
  return Date.now().toString(36) + Math.random().toString(36).slice(2, 8);
}

const STORAGE_KEY = "pdca-corgi-cycles";

function CorgiFace({ size = 44, mood = "happy" }) {
  return (
    <svg width={size} height={size} viewBox="0 0 100 100">
      <ellipse cx="50" cy="58" rx="38" ry="34" fill="#F2A65A" />
      <path d="M20 35 L8 4 L40 28 Z" fill="#F2A65A" />
      <path d="M20 35 L8 4 L40 28 Z" fill="none" stroke="#D88A3E" strokeWidth="2" />
      <path d="M80 35 L92 4 L60 28 Z" fill="#F2A65A" />
      <path d="M80 35 L92 4 L60 28 Z" fill="none" stroke="#D88A3E" strokeWidth="2" />
      <path d="M22 30 L14 10 L36 26 Z" fill="#F6C99A" />
      <path d="M78 30 L86 10 L64 26 Z" fill="#F6C99A" />
      <path d="M50 50 C30 50 26 75 50 88 C74 75 70 50 50 50 Z" fill="#FBEFE0" />
      <circle cx="36" cy="56" r="4.2" fill="#3A2A1E" />
      <circle cx="64" cy="56" r="4.2" fill="#3A2A1E" />
      <ellipse cx="50" cy="70" rx="6" ry="4.5" fill="#3A2A1E" />
      {mood === "happy" ? (
        <path d="M40 76 Q50 86 60 76" fill="none" stroke="#3A2A1E" strokeWidth="2.5" strokeLinecap="round" />
      ) : (
        <path d="M42 80 Q50 76 58 80" fill="none" stroke="#3A2A1E" strokeWidth="2.5" strokeLinecap="round" />
      )}
    </svg>
  );
}

function StagePanel({ stage, cycle, onChange, isMobile, isFirstEmpty }) {
  const [draft, setDraft] = useState(cycle[stage.key] || "");
  const timer = useRef(null);

  useEffect(() => { setDraft(cycle[stage.key] || ""); }, [cycle.id, stage.key]);

  function handleInput(v) {
    setDraft(v);
    clearTimeout(timer.current);
    timer.current = setTimeout(() => onChange(stage.key, v), 400);
  }
  function addChip(text) {
    const next = draft ? draft + (draft.endsWith("\n") ? "" : "\n") + text + ": " : text + ": ";
    handleInput(next);
  }

  return (
    <div style={{ background: stage.bg, borderRadius: 16, padding: isMobile ? "14px 14px" : "18px 20px",
      marginBottom: 14, border: isFirstEmpty ? `2px solid ${stage.color}` : "2px solid transparent",
      boxShadow: isFirstEmpty ? `0 0 0 4px ${stage.color}22` : "none", transition: "box-shadow 0.3s ease" }}>
      <div style={{ display: "flex", alignItems: "center", gap: 10, marginBottom: 6 }}>
        <span style={{ fontSize: 22 }}>{stage.emoji}</span>
        <div>
          <div style={{ display: "flex", alignItems: "baseline", gap: 8, flexWrap: "wrap" }}>
            <span style={{ fontWeight: 800, fontSize: 16, color: stage.color, letterSpacing: 0.5 }}>{stage.label}</span>
            <span style={{ fontSize: 12, color: "#8A8278" }}>{stage.ja} ・ {stage.desc}</span>
          </div>
        </div>
      </div>
      {isFirstEmpty && (
        <div style={{ fontSize: 12.5, color: "#5A4A3A", background: "#fff", borderRadius: 10,
          padding: "7px 10px", marginBottom: 9, display: "inline-block" }}>{stage.hint}</div>
      )}
      <div style={{ display: "flex", gap: 6, flexWrap: "wrap", marginBottom: 8 }}>
        {stage.chips.map((chip) => (
          <button key={chip} onClick={() => addChip(chip)} style={{ border: `1px solid ${stage.color}55`,
            background: "#fff", color: stage.color, borderRadius: 999, padding: "4px 10px",
            fontSize: 11.5, cursor: "pointer", fontWeight: 600 }}>+ {chip}</button>
        ))}
      </div>
      <textarea value={draft} onChange={(e) => handleInput(e.target.value)}
        placeholder="ここに書く...（上のボタンをタップしても始められるよ）" rows={3}
        style={{ width: "100%", resize: "vertical", border: "1px solid #E4DFD4", borderRadius: 10,
          padding: "10px 12px", fontSize: 16, fontFamily: "inherit", color: "#34302A",
          background: "#fff", boxSizing: "border-box", outline: "none" }}
        onFocus={(e) => (e.target.style.borderColor = stage.color)}
        onBlur={(e) => (e.target.style.borderColor = "#E4DFD4")} />
    </div>
  );
}

function RingProgress({ cycle, size = 56 }) {
  const filled = STAGES.filter((s) => (cycle[s.key] || "").trim().length > 0).length;
  const r = size / 2 - 6;
  const c = 2 * Math.PI * r;
  return (
    <svg width={size} height={size} viewBox={`0 0 ${size} ${size}`} style={{ flexShrink: 0 }}>
      <circle cx={size / 2} cy={size / 2} r={r} fill="none" stroke="#E9E4D8" strokeWidth="5" />
      <circle cx={size / 2} cy={size / 2} r={r} fill="none" stroke="#E07A2C" strokeWidth="5"
        strokeDasharray={c} strokeDashoffset={c - (c * filled) / 4} strokeLinecap="round"
        transform={`rotate(-90 ${size / 2} ${size / 2})`} style={{ transition: "stroke-dashoffset 0.4s ease" }} />
      <text x={size / 2} y={size / 2 + 4} textAnchor="middle" fontSize="13" fontWeight="800" fill="#34302A">{filled}/4</text>
    </svg>
  );
}

function useIsMobile() {
  const [isMobile, setIsMobile] = useState(window.innerWidth < 720);
  useEffect(() => {
    const onResize = () => setIsMobile(window.innerWidth < 720);
    window.addEventListener("resize", onResize);
    return () => window.removeEventListener("resize", onResize);
  }, []);
  return isMobile;
}

const GREETINGS = ["今日も一歩、いこう!", "小さな一歩が大きな変化に。", "やってみることがいちばんの近道!", "コギまろが見守ってるよ。"];

function PDCAApp() {
  const [cycles, setCycles] = useState([]);
  const [activeId, setActiveId] = useState(null);
  const [loaded, setLoaded] = useState(false);
  const [editingTitle, setEditingTitle] = useState(false);
  const [menuOpen, setMenuOpen] = useState(false);
  const isMobile = useIsMobile();
  const greeting = useRef(GREETINGS[Math.floor(Math.random() * GREETINGS.length)]);

  useEffect(() => {
    try {
      const raw = localStorage.getItem(STORAGE_KEY);
      const data = raw ? JSON.parse(raw) : [];
      if (data.length === 0) {
        const first = { id: uid(), title: "はじめてのサイクル", plan: "", do: "", check: "", act: "", createdAt: Date.now() };
        setCycles([first]); setActiveId(first.id);
      } else {
        setCycles(data); setActiveId(data[0].id);
      }
    } catch (e) {
      const first = { id: uid(), title: "はじめてのサイクル", plan: "", do: "", check: "", act: "", createdAt: Date.now() };
      setCycles([first]); setActiveId(first.id);
    }
    setLoaded(true);
  }, []);

  useEffect(() => {
    if (!loaded) return;
    localStorage.setItem(STORAGE_KEY, JSON.stringify(cycles));
  }, [cycles, loaded]);

  const active = cycles.find((c) => c.id === activeId);

  function updateField(key, val) {
    setCycles((prev) => prev.map((c) => (c.id === activeId ? { ...c, [key]: val } : c)));
  }
  function newCycle() {
    const n = { id: uid(), title: `サイクル ${cycles.length + 1}`, plan: "", do: "", check: "", act: "", createdAt: Date.now() };
    setCycles((prev) => [n, ...prev]); setActiveId(n.id); setMenuOpen(false);
  }
  function selectCycle(id) { setActiveId(id); setMenuOpen(false); }
  function deleteCycle(id) {
    setCycles((prev) => {
      const next = prev.filter((c) => c.id !== id);
      if (id === activeId && next.length > 0) setActiveId(next[0].id);
      if (next.length === 0) setActiveId(null);
      return next;
    });
  }
  function renameCycle(val) { updateFieldForId(activeId, "title", val); }
  function updateFieldForId(id, key, val) {
    setCycles((prev) => prev.map((c) => (c.id === id ? { ...c, [key]: val } : c)));
  }

  if (!loaded) {
    return <div style={{ fontFamily: "sans-serif", padding: 40, color: "#8A8278", display: "flex", alignItems: "center", gap: 10 }}>
      <CorgiFace size={32} /> よみこみ中...</div>;
  }

  const firstEmptyKey = active ? (STAGES.find((s) => !(active[s.key] || "").trim()) || {}).key : null;

  const sidebarContent = (
    <React.Fragment>
      <div style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 4 }}>
        <CorgiFace size={30} />
        <div style={{ fontWeight: 800, fontSize: 19, letterSpacing: 1 }}>PDCAコギ</div>
      </div>
      <div style={{ fontSize: 11.5, color: "#F2A65A", marginBottom: 18 }}>毎日ちょっとずつ、かいぜん!</div>
      <button onClick={newCycle} style={{ background: "linear-gradient(135deg, #E07A2C, #F2A65A)", color: "#fff",
        border: "none", borderRadius: 999, padding: "11px 0", fontSize: 14, fontWeight: 700, cursor: "pointer",
        marginBottom: 16, boxShadow: "0 3px 10px rgba(224,122,44,0.35)" }}>🐾 あたらしいサイクル</button>
      <div style={{ overflowY: "auto", flex: 1 }}>
        {cycles.map((c) => {
          const filled = STAGES.filter((s) => (c[s.key] || "").trim()).length;
          return (
            <div key={c.id} onClick={() => selectCycle(c.id)} style={{ padding: "11px 10px", borderRadius: 10,
              marginBottom: 4, cursor: "pointer", background: c.id === activeId ? "rgba(242,166,90,0.28)" : "transparent",
              display: "flex", justifyContent: "space-between", alignItems: "center", gap: 6 }}>
              <span style={{ fontSize: 14, overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>{c.title || "無題"}</span>
              <span style={{ fontSize: 10, color: "#F2A65A", flexShrink: 0, fontWeight: 700 }}>{filled}/4</span>
            </div>
          );
        })}
      </div>
    </React.Fragment>
  );

  return (
    <div style={{ fontFamily: "'Hiragino Sans', 'Noto Sans JP', sans-serif", background: "#FBF8F2",
      minHeight: "100vh", display: "flex", flexDirection: isMobile ? "column" : "row", color: "#34302A" }}>
      {isMobile ? (
        <React.Fragment>
          <div style={{ background: "#2E2A24", color: "#FBF8F2", padding: "12px 16px", display: "flex",
            alignItems: "center", justifyContent: "space-between", position: "sticky", top: 0, zIndex: 20 }}>
            <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
              <CorgiFace size={26} />
              <div style={{ fontWeight: 800, fontSize: 16, letterSpacing: 1 }}>PDCAコギ</div>
            </div>
            <button onClick={() => setMenuOpen((v) => !v)} style={{ background: "transparent", border: "1px solid #5A5347",
              color: "#FBF8F2", borderRadius: 999, padding: "6px 12px", fontSize: 13, display: "flex",
              alignItems: "center", gap: 6 }}>{active ? active.title || "無題" : "サイクル"} ▾</button>
          </div>
          {menuOpen && (
            <div style={{ background: "#2E2A24", color: "#FBF8F2", padding: "14px 16px 18px", display: "flex",
              flexDirection: "column", maxHeight: "60vh", overflowY: "auto", position: "sticky", top: 49, zIndex: 19 }}>
              {sidebarContent}
            </div>
          )}
        </React.Fragment>
      ) : (
        <div style={{ width: 230, background: "#2E2A24", color: "#FBF8F2", padding: "22px 16px", display: "flex",
          flexDirection: "column", flexShrink: 0, position: "sticky", top: 0, height: "100vh" }}>{sidebarContent}</div>
      )}

      <div style={{ flex: 1, padding: isMobile ? "18px 14px 40px" : "32px 36px", maxWidth: isMobile ? "100%" : 760, boxSizing: "border-box" }}>
        {!active ? (
          <div style={{ color: "#8A8278", display: "flex", alignItems: "center", gap: 10 }}>
            <CorgiFace size={36} mood="sad" /> サイクルがありません。あたらしく作ってみよう!</div>
        ) : (
          <React.Fragment>
            <div style={{ display: "flex", alignItems: "center", gap: 12, background: "linear-gradient(135deg, #FDEFD9, #FBE3D3)",
              borderRadius: 16, padding: "12px 16px", marginBottom: 16 }}>
              <CorgiFace size={isMobile ? 40 : 48} />
              <div style={{ fontSize: isMobile ? 13 : 14, fontWeight: 600, color: "#5A4A3A" }}>
                {greeting.current}
                {firstEmptyKey && (
                  <div style={{ fontSize: 12, fontWeight: 400, color: "#8A7560", marginTop: 2 }}>
                    次は「{STAGES.find((s) => s.key === firstEmptyKey).label}」から書いてみよう ↓
                  </div>
                )}
              </div>
            </div>

            <div style={{ display: "flex", alignItems: "center", gap: isMobile ? 10 : 14, marginBottom: isMobile ? 16 : 22, flexWrap: "wrap" }}>
              <RingProgress cycle={active} />
              <div style={{ flex: 1, minWidth: 140 }}>
                {editingTitle ? (
                  <input autoFocus value={active.title} onChange={(e) => renameCycle(e.target.value)}
                    onBlur={() => setEditingTitle(false)} onKeyDown={(e) => e.key === "Enter" && setEditingTitle(false)}
                    style={{ fontSize: isMobile ? 18 : 22, fontWeight: 800, border: "none", borderBottom: "2px solid #E07A2C",
                      background: "transparent", outline: "none", width: "100%", color: "#34302A" }} />
                ) : (
                  <h1 onClick={() => setEditingTitle(true)} style={{ fontSize: isMobile ? 18 : 22, fontWeight: 800, margin: 0, cursor: "text" }}
                    title="クリックして名前を変更">{active.title}</h1>
                )}
                <div style={{ fontSize: 12, color: "#8A8278", marginTop: 2 }}>
                  作成日: {new Date(active.createdAt).toLocaleDateString("ja-JP")}
                </div>
              </div>
              <button onClick={() => deleteCycle(active.id)} style={{ border: "1px solid #E4DFD4", background: "#fff",
                color: "#A05A4A", borderRadius: 999, padding: "8px 14px", fontSize: 12, cursor: "pointer" }}>削除</button>
            </div>

            {STAGES.map((stage) => (
              <StagePanel key={stage.key} stage={stage} cycle={active} onChange={updateField}
                isMobile={isMobile} isFirstEmpty={stage.key === firstEmptyKey} />
            ))}

            <div style={{ display: "flex", justifyContent: "center", alignItems: "center", flexWrap: "wrap",
              gap: 6, marginTop: 24, fontSize: 11, color: "#B5AD9E" }}>
              {STAGES.map((s, i) => (
                <span key={s.key} style={{ display: "flex", alignItems: "center", gap: 6 }}>
                  <span style={{ color: s.color, fontWeight: 700 }}>{s.emoji} {s.label}</span>
                  {i < STAGES.length - 1 && <span>→</span>}
                </span>
              ))}
              <span>→ {STAGES[0].emoji} {STAGES[0].label}</span>
            </div>
          </React.Fragment>
        )}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<PDCAApp />);
</script>
<script>
  if ("serviceWorker" in navigator) {
    window.addEventListener("load", () => {
      navigator.serviceWorker.register("./sw.js").catch(() => {});
    });
  }
</script>
</body>
</html>
